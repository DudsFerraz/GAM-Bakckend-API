name: Testes e Cobertura Java

# Define quando a Action vai rodar (ao fazer push ou pull request para a main)
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      # Passo 1: Baixa o código do repositório
      - name: Checkout do código
        uses: actions/checkout@v4

      # Passo 2: Prepara o ambiente Java
      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # Passo 3: Roda os testes e gera o relatório do JaCoCo
      - name: Executar testes com Maven
        run: mvn clean test

      # Passo 4: Salva o relatório de cobertura gerado para download
      - name: Fazer Upload do Relatório de Cobertura
        uses: actions/upload-artifact@v4
        # O if: always() garante que o relatório seja salvo mesmo se um teste falhar
        if: always()
        with:
          name: relatorio-cobertura-jacoco
          path: target/site/jacoco/