name: Testes e Cobertura Java

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    # 1. Adicionamos o serviço do PostgreSQL
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_DB: gam_db
          POSTGRES_USER: usuario_teste
          POSTGRES_PASSWORD: senha_teste
        # Mapeia a porta padrão do container para a máquina do GitHub
        ports:
          - 5432:5432
        # Aguarda o banco estar pronto antes de rodar os testes
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout do código
        uses: actions/checkout@v4

      - name: Configurar JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      # 2. Executamos os testes injetando as variáveis de ambiente
      - name: Executar testes com Maven
        env:
          SPRING_DATASOURCE_URL: jdbc:postgresql://localhost:5432/gam_db
          SPRING_DATASOURCE_USERNAME: usuario_teste
          SPRING_DATASOURCE_PASSWORD: senha_teste
          SPRING_PROFILES_ACTIVE: default # Força o Spring a não procurar o perfil "local"
          JWT_SECRET_KEY: uma_chave_secreta_muito_longa_apenas_para_passar_os_testes_no_github_actions_12345!
        run: mvn clean test

      - name: Fazer Upload do Relatório de Cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: relatorio-cobertura-jacoco
          path: target/site/jacoco/